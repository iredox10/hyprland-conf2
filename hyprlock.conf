# =============================================
#  Hyprlock - Catppuccin Mocha Lock Screen
# =============================================

general {
    hide_cursor = true
    grace = 3
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 6
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# ---- Clock ----
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(205, 214, 244, 1.0)
    font_size = 90
    font_family = Fira Code Bold

    position = 0, 260
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.5)
}

# ---- Date ----
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%A, %B %d")</span>"
    color = rgba(186, 194, 222, 0.9)
    font_size = 18
    font_family = Fira Code

    position = 0, 180
    halign = center
    valign = center
}

# ---- Greeting ----
label {
    monitor =
    text = Hi, $USER
    color = rgba(180, 190, 254, 0.9)
    font_size = 16
    font_family = Fira Code

    position = 0, 40
    halign = center
    valign = center
}

# ---- Password Input ----
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(137, 180, 250, 0.4)
    inner_color = rgba(30, 30, 46, 0.85)
    font_color = rgba(205, 214, 244, 1.0)
    fade_on_empty = true
    fade_timeout = 2000

    placeholder_text = <span foreground="##bac2de">Enter Password...</span>
    hide_input = false
    rounding = 14

    check_color = rgba(166, 227, 161, 0.7)
    fail_color = rgba(243, 139, 168, 0.7)
    fail_text = <span foreground="##f38ba8">Wrong Password</span>
    fail_transition = 300

    capslock_color = rgba(249, 226, 175, 0.7)

    position = 0, -40
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 4
}